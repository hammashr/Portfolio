<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#050816"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.9"/>

  <!-- Inner subtle ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#915eff" stroke-width="0.8" opacity="0.4"/>

  <!-- HA text -->
  <text
    x="32" y="38"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="20"
    font-weight="900"
    letter-spacing="-0.5"
    fill="url(#grad)"
  >HA</text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#915eff"/>
    </linearGradient>
  </defs>
</svg>
